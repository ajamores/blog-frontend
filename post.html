<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/styles/post.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="bg-sky-800 text-white max-h-max pt-16 pb-16">

      <header class="fixed top-0 left-0 right-0 py-4  bg-ctp-latte-text/80 shadow-2xl backdrop-blur-sm ">
        <div class=" max-w-6xl mx-auto flex justify-between">
          <h1 class="  sm:ml-15 font-extrabold text-2xl text-ctp-peach">Armand Amores</h1>
          <nav class="  sm:mr-15  gap-4 text-lg flex">
            <a href="#"  class="hidden md:flex" >Home</a>
            <a href="#" class="hidden md:flex">About</a>
            <a href="/" class="hidden md:flex">Blog</a>
            <a href="#" class="hidden md:flex">Resume</a>
            <button class="border rounded-4xl p-1 cursor-pointer "><i data-lucide="sun"></i></button>
            <button id="menuBtn" class="block md:hidden "><i data-lucide="menu"></i></button>
            <a href="#" class="hidden md:flex">Github</a>
            <a href="#" class="hidden md:flex">Linkedin</a>
            <a href="#" class="hidden md:flex">Youtube</a>
          </nav>
        </div>
      </header>

      <main class="">
        
        <div id="content">

          <a href="/" id="backToBlog" class="flex gap-1 my-5 text-ctp-peach hover:text-white group mb-10 "  >
            <i data-lucide="arrow-left" class="group-hover:-translate-x-1 transition-transform duration-200 ease-out"></i>
            <p>back to blog</p>
          </a>

          <div class="mb-5 flex gap-2 items-center text-stone-300 bg-gray-500 w-max px-2 rounded-2xl">
            <i data-lucide="calendar" class="w-4 h-4"></i>
            <div id="date"></div>
          </div>

          <div id="title"></div>
          <div id="excerpt"></div>
          <div id="categories" class="flex gap-4 my-10"></div>

        </div>

      </main>

    </div>
    <script type="module" src="/src/pages/post.js"></script>
    <script>lucide.createIcons()</script>
</body>
</html>

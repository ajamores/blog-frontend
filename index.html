<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blog-frontend</title>
    <link rel="stylesheet" href="./src/styles/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>

    <div class="bg-linear-to-r from-stone-200 to-sky-300 text-white max-h-max pt-16 pb-16">

      <header class="fixed top-0 left-0 right-0 py-4  bg-ctp-latte-text/80 shadow-2xl backdrop-blur-sm ">
        <div class=" max-w-6xl mx-auto flex justify-between">
          <h1 class="  sm:ml-15 font-extrabold text-2xl text-ctp-peach">Armand Amores</h1>
          <nav class="  sm:mr-15  gap-4 text-lg flex">
            <a href="#"  class="hidden md:flex" >Home</a>
            <a href="#" class="hidden md:flex">About</a>
            <a href="/" class="hidden md:flex">Blog</a>
            <a href="#" class="hidden md:flex">Resume</a>
            <button class="border rounded-4xl p-1 cursor-pointer "><i data-lucide="sun"></i></button>
            <button id="menuBtn" class="block md:hidden "><i data-lucide="menu"></i></button>
            <a href="#" class="hidden md:flex">Github</a>
            <a href="#" class="hidden md:flex">Linkedin</a>
            <a href="#" class="hidden md:flex">Youtube</a>
          </nav>
        </div>
      </header>

      <main class="mt-24 text-center text-ctp-mantle">
        <h1 class="text-6xl mb-10 font-extrabold">Things I Think About</h1>
        <h2 class="text-ctp-latte-text text-2xl">A blog to spill my thoughts on life, goals, technology and more </h2>
        <div id="tags" class="flex gap-6  justify-center mt-6"></div>
        <div id="posts" class="mt-10 flex flex-col items-center gap-9 "></div>
      </main>

    </div>

    <script type="module" src="/src/pages/index.js"></script>
    <script>lucide.createIcons()</script>
  </body>
</html>
